                "name": "How is this different from Mem0, Zep, or built-in agent memory?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Those store what an agent remembers. Brian governs what it’s allowed to do. Skills carry hard rules, guardrails, and escalation targets — enforcement and audit, not just recall. Memory’s a feature here. Safe delegation is the product."
                }
              },
              {
                "@type": "Question",
                "name": "What happens when a skill is wrong or goes stale?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "A correction from any session revises the skill instead of duplicating it — every revision versioned. Skills that get overridden a lot, or haven’t been touched while the company changed, get flagged to their owner."
                }
              },
              {
                "@type": "Question",
                "name": "Can automatically extracted knowledge go live without review?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. It goes live on its own only when the classifier is confident and every tool the skill uses is reversible. Anything touching an irreversible tool — like sending email — parks as a draft until a human approves it."
                }
              },
              {
                "@type": "Question",
                "name": "Is this \"chat with your docs\"?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Brian isn’t RAG over documents, and it’s not a knowledge base with a chat window. It stores executable procedures with decision logic — built so an agent can do the work, not describe it."
