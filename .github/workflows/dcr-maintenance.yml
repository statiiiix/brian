name: DCR maintenance

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: Delete eligible dynamic clients
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 * * * *"
    - cron: "41 2 * * *"

permissions:
  contents: read

concurrency:
  group: dcr-maintenance-${{ github.event_name }}-${{ github.event.schedule || inputs.cleanup || 'audit' }}
  cancel-in-progress: false

jobs:
  audit:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '17 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.cleanup == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Emit count-only registry audit
        run: npm run oauth:dcr:audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DCR_MAINTENANCE_DATABASE_URL: ${{ secrets.DCR_MAINTENANCE_DATABASE_URL }}
          DCR_PROTECTED_CLIENT_IDS: ${{ secrets.DCR_PROTECTED_CLIENT_IDS }}

  cleanup:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '41 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.cleanup == true)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Emit count-only registry cleanup
        run: npm run oauth:dcr:audit -- --delete-stale --yes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DCR_MAINTENANCE_DATABASE_URL: ${{ secrets.DCR_MAINTENANCE_DATABASE_URL }}
          DCR_PROTECTED_CLIENT_IDS: ${{ secrets.DCR_PROTECTED_CLIENT_IDS }}
